<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Admin</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div style="display: flex; justify-content: flex-end">
      <button onclick="logout()">Logout</button>
    </div>
    <section class="card">
      <h2>Register Employee</h2>

      <div class="grid">
        <input id="regEmployeeId" placeholder="Employee ID" />
        <input id="regName" placeholder="Name" />
        <input id="regDepartment" placeholder="Department" />
        <input id="regShift" placeholder="Shift Start (HH:MM:SS)" />

        <input type="file" id="photoInput" accept="image/*" />

        <button id="registerBtn">Register Employee</button>
      </div>

      <div id="registerStatus"></div>
    </section>
    <main class="container">
      <h1>Attendance Admin</h1>

      <section class="card">
        <h2>Register Employee</h2>
        <div class="grid">
          <input id="regEmployeeId" placeholder="Employee ID (e.g., EMP001)" />
          <input id="regName" placeholder="Full Name" />
          <input id="regEmail" placeholder="Email" type="email" />
          <input id="regPassword" placeholder="Password" type="password" />
          <input id="regDepartment" placeholder="Department" value="General" />
          <input id="regShiftStart" placeholder="Shift Start (HH:MM:SS)" value="09:00:00" />
          <input id="regPhoto" type="file" accept="image/*" />
          <button id="registerBtn">Register Employee</button>
        </div>
        <div id="registerStatus"></div>
      </section>

      <section class="card">
        <h2>Attendance Records</h2>
        <div class="grid">
          <input id="employeeId" placeholder="employee_id (e.g. EMP002)" />

          <div>
            <label>From Date (YYYY-MM-DD)</label>
            <input id="dateFrom" type="date" />
          </div>

          <div>
            <label>To Date (YYYY-MM-DD)</label>
            <input id="dateTo" type="date" />
          </div>

          <select id="status">
            <option value="">All Status</option>
            <option value="PRESENT">PRESENT</option>
            <option value="LATE">LATE</option>
            <option value="ABSENT">ABSENT</option>
          </select>

          <button id="loadBtn">Load Records</button>
        </div>
        <div id="summary"></div>
        <table id="table">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Name</th>
              <th>Date</th>
              <th>Status</th>
              <th>Clock In</th>
              <th>Clock Out</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="/js/config.js?v=2"></script>
    <script src="/js/auth.js?v=6"></script>
    <script src="/js/admin.js?v=6"></script>
  </body>
</html>
