<!doctype html>

<html>
  <head>
    <title>Admin Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4f46e5, #9333ea);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      .login-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: #4338ca;
      }

      .note {
        margin-top: 10px;
        font-size: 12px;
        color: gray;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <h2>Admin Login</h2>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button onclick="login()">Login</button>

      <div class="note">Only admins can access dashboard</div>
    </div>

    <script src="/js/config.js?v=2"></script>
    <script src="/js/auth.js?v=6"></script>
  </body>
</html>
